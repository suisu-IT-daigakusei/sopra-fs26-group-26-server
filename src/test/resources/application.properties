# Fast unit/context tests use isolated H2. PostgreSQL-specific repository tests override this
# with Testcontainers and exercise the real Flyway schema.
spring.datasource.url=jdbc:h2:mem:cabo-tests;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.type.json_format_mapper=ch.uzh.ifi.hase.soprafs26.config.ToolsJacksonJsonFormatMapper
spring.jpa.open-in-view=false
spring.flyway.enabled=false
spring.h2.console.enabled=false
