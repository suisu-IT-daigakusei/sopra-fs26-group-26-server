# Local PostgreSQL defaults match compose.yaml. Override any value through the environment.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cabo}
spring.datasource.username=${DB_USERNAME:cabo}
spring.datasource.password=${DB_PASSWORD:cabo-local-dev}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=1000

