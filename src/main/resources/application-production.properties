# Production has no credential defaults: all three variables are required at startup.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
server.tomcat.threads.max=${SERVER_THREADS_MAX:48}
server.tomcat.threads.min-spare=${SERVER_THREADS_MIN_SPARE:8}
server.tomcat.accept-count=${SERVER_ACCEPT_COUNT:100}
server.tomcat.max-connections=${SERVER_MAX_CONNECTIONS:500}
server.connection-timeout=5s

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
