# Profile "gcp" – Google App Engine Standard (Java 17).
# Activated via SPRING_PROFILES_ACTIVE=gcp in app.yaml.
# H2 remains the DB engine; file storage + single instance (see app.yaml) avoids split in-memory DBs.

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ------------------------------------------------------------
# SINGLE-INSTANCE RESILIENCE TUNING (NO INSTANCE SCALE CHANGE)
# Keep one instance responsive under reconnect/poll bursts by
# bounding request concurrency and queue depth.
# ------------------------------------------------------------
# Tomcat worker threads per instance.
server.tomcat.threads.max=24
server.tomcat.threads.min-spare=8
# Backlog for accepted sockets waiting for a worker thread.
server.tomcat.accept-count=40
# Upper bound for simultaneous open HTTP connections.
server.tomcat.max-connections=120
# Fail fast on slow inbound connections.
server.connection-timeout=5s

# Hikari pool limits for embedded H2 file DB in single-instance mode.
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=1000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000

# File-based H2 on instance disk (same JVM / one instance = one DB; redeploy may reset).
spring.datasource.url=jdbc:h2:file:/tmp/h2/cabo;AUTO_SERVER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Public H2 console loops behind GAE HTTPS proxy; disable in cloud.
spring.h2.console.enabled=false

# ============================================================
# CENTRAL SETTINGS
# Cloud profile uses the same knobs as local, with cloud-safe defaults.
# ============================================================

# SERVER SETTINGS
# Scheduler threads used by game timers and round-transition jobs.
app.server.game-scheduler-thread-pool-size=10
# WebSocket inbound/outbound channel executor bounds and queue capacities.
app.server.websocket-inbound-core-pool-size=4
app.server.websocket-inbound-max-pool-size=16
app.server.websocket-inbound-queue-capacity=200
app.server.websocket-outbound-core-pool-size=4
app.server.websocket-outbound-max-pool-size=16
app.server.websocket-outbound-queue-capacity=300
# WebSocket transport back-pressure and message size guardrails.
app.server.websocket-send-time-limit-ms=15000
app.server.websocket-send-buffer-size-limit-bytes=524288
app.server.websocket-message-size-limit-bytes=131072
# Cap active websocket sessions per user (latest N kept for broadcasts).
app.server.max-websocket-sessions-per-user=2
# Per-user spacing for hot fallback endpoints.
app.server.hot-endpoint-min-interval-ms=450
# Token-bucket limiter for reconnect/fallback bursts.
app.server.hot-endpoint-burst-capacity=5
app.server.hot-endpoint-refill-tokens-per-second=2.5
app.server.hot-endpoint-sync-state-burst-capacity=6
app.server.hot-endpoint-sync-state-refill-tokens-per-second=3.0
app.server.hot-endpoint-post-round-burst-capacity=4
app.server.hot-endpoint-post-round-refill-tokens-per-second=2.0
app.server.hot-endpoint-entry-ttl-ms=180000
# Tiny transient cache windows for repeated lobby/game lookups.
app.server.playing-lobby-snapshot-cache-ttl-ms=1500
app.server.waiting-lobby-lookup-cache-ttl-ms=1200
app.server.max-transient-lookup-cache-entries=4096
app.server.auth-token-lookup-cache-ttl-ms=1500
app.server.sync-state-cache-ttl-ms=1200
app.server.rematch-duplicate-decision-window-ms=900
app.server.websocket-session-stale-after-ms=660000
app.server.websocket-session-prune-interval-ms=30000
# Allowed frontend origins for browser calls.
app.server.cors-allowed-origins=https://sopra-fs26-group-26-client.vercel.app,http://localhost:3000,http://127.0.0.1:3000

# GAME SETTINGS
# Core player limits.
app.game.min-players=2
app.game.max-players=4
# Cards dealt to each player at game start.
app.game.starter-cards-per-player=4
# Initial "memorize your cards" phase duration.
app.game.initial-peek-seconds=10
# Normal turn timeout.
app.game.turn-seconds=30
# Ability timeout fallback.
app.game.ability-seconds=30
# After peek/spy selection, auto-end ability after this many seconds.
app.game.post-peek-auto-end-seconds=5
# Swap ability window (select own + opponent card) before auto-end.
app.game.ability-swap-seconds=10
# End-of-round full-card unveil window before rematch voting begins.
app.game.cabo-reveal-seconds=30
# Rematch decision window after Cabo cycle completes.
app.game.rematch-decision-seconds=60

# TIMEOUT SETTINGS
# WebSocket disconnect grace period before permanent disconnect handling.
app.timeouts.websocket-grace-seconds=300
# AFK detection threshold.
app.timeouts.idle-seconds=300
# Auto-logout threshold for long inactivity.
app.timeouts.auto-logout-seconds=3600
# Background checker frequency (idle).
app.timeouts.idle-check-interval-ms=10000
# Background checker frequency (auto-logout).
app.timeouts.auto-logout-check-interval-ms=300000

# LOBBY HOST TIMER SETTINGS (defaults and selectable ranges)
app.lobby-settings.afk-timeout-default-seconds=300
app.lobby-settings.afk-timeout-min-seconds=180
app.lobby-settings.afk-timeout-max-seconds=600
app.lobby-settings.initial-peek-default-seconds=10
app.lobby-settings.initial-peek-min-seconds=3
app.lobby-settings.initial-peek-max-seconds=60
app.lobby-settings.turn-default-seconds=30
app.lobby-settings.turn-min-seconds=10
app.lobby-settings.turn-max-seconds=60
app.lobby-settings.ability-reveal-default-seconds=5
app.lobby-settings.ability-reveal-min-seconds=3
app.lobby-settings.ability-reveal-max-seconds=10
app.lobby-settings.ability-swap-default-seconds=10
app.lobby-settings.ability-swap-min-seconds=5
app.lobby-settings.ability-swap-max-seconds=30
app.lobby-settings.absent-round-points-default=20
app.lobby-settings.absent-round-points-min=0
app.lobby-settings.absent-round-points-max=100
app.lobby-settings.websocket-grace-default-seconds=300
app.lobby-settings.websocket-grace-min-seconds=180
app.lobby-settings.websocket-grace-max-seconds=600
app.lobby-settings.chat-cooldown-default-seconds=3
app.lobby-settings.chat-cooldown-min-seconds=1
app.lobby-settings.chat-cooldown-max-seconds=60
