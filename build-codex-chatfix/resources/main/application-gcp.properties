# Profile "gcp" – Google App Engine Standard (Java 17).
# Activated via SPRING_PROFILES_ACTIVE=gcp in app.yaml.
# H2 remains the DB engine; file storage + single instance (see app.yaml) avoids split in-memory DBs.

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# File-based H2 on instance disk (same JVM / one instance = one DB; redeploy may reset).
spring.datasource.url=jdbc:h2:file:/tmp/h2/cabo;AUTO_SERVER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Public H2 console loops behind GAE HTTPS proxy; disable in cloud.
spring.h2.console.enabled=false

# ============================================================
# CENTRAL SETTINGS
# Cloud profile uses the same knobs as local, with cloud-safe defaults.
# ============================================================

# SERVER SETTINGS
# Scheduler threads used by game timers and round-transition jobs.
app.server.game-scheduler-thread-pool-size=10
# Allowed frontend origins for browser calls.
app.server.cors-allowed-origins=https://sopra-fs26-group-26-client.vercel.app,http://localhost:3000

# GAME SETTINGS
# Core player limits.
app.game.min-players=2
app.game.max-players=4
# Cards dealt to each player at game start.
app.game.starter-cards-per-player=4
# Initial "memorize your cards" phase duration.
app.game.initial-peek-seconds=10
# Normal turn timeout.
app.game.turn-seconds=30
# Ability timeout fallback.
app.game.ability-seconds=30
# After peek/spy selection, auto-end ability after this many seconds.
app.game.post-peek-auto-end-seconds=5
# Swap ability window (select own + opponent card) before auto-end.
app.game.ability-swap-seconds=10
# End-of-round full-card unveil window before rematch voting begins.
app.game.cabo-reveal-seconds=30
# Rematch decision window after Cabo cycle completes.
app.game.rematch-decision-seconds=60

# TIMEOUT SETTINGS
# WebSocket disconnect grace period before permanent disconnect handling.
app.timeouts.websocket-grace-seconds=300
# AFK detection threshold.
app.timeouts.idle-seconds=300
# Auto-logout threshold for long inactivity.
app.timeouts.auto-logout-seconds=3600
# Background checker frequency (idle).
app.timeouts.idle-check-interval-ms=60000
# Background checker frequency (auto-logout).
app.timeouts.auto-logout-check-interval-ms=300000

# LOBBY HOST TIMER SETTINGS (defaults and selectable ranges)
app.lobby-settings.afk-timeout-default-seconds=300
app.lobby-settings.afk-timeout-min-seconds=180
app.lobby-settings.afk-timeout-max-seconds=600
app.lobby-settings.initial-peek-default-seconds=10
app.lobby-settings.initial-peek-min-seconds=3
app.lobby-settings.initial-peek-max-seconds=60
app.lobby-settings.turn-default-seconds=30
app.lobby-settings.turn-min-seconds=10
app.lobby-settings.turn-max-seconds=60
app.lobby-settings.ability-reveal-default-seconds=5
app.lobby-settings.ability-reveal-min-seconds=3
app.lobby-settings.ability-reveal-max-seconds=10
app.lobby-settings.ability-swap-default-seconds=10
app.lobby-settings.ability-swap-min-seconds=5
app.lobby-settings.ability-swap-max-seconds=30
app.lobby-settings.absent-round-points-default=20
app.lobby-settings.absent-round-points-min=0
app.lobby-settings.absent-round-points-max=100
app.lobby-settings.websocket-grace-default-seconds=300
app.lobby-settings.websocket-grace-min-seconds=180
app.lobby-settings.websocket-grace-max-seconds=600
app.lobby-settings.chat-cooldown-default-seconds=3
app.lobby-settings.chat-cooldown-min-seconds=1
app.lobby-settings.chat-cooldown-max-seconds=60
